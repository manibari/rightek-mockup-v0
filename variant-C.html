<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rightek — Variant C 冷靜 builder</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700&display=swap" rel="stylesheet">
<link href="https://fonts.bunny.net/css?family=dm-sans:400,500,700|jetbrains-mono:400,500" rel="stylesheet">
<style>
  :root {
    --primary-azure: #0B5FBF;
    --primary-azure-deep: #083F80;
    --accent-cyan: #00C4FF;
    --surface-dark: #0F1419;
    --surface-elevated: #1A1F26;
    --text-primary: #F5F7FA;
    --text-secondary: #A8B2C0;
    --text-muted: #7B8794;
    --border-subtle: #2A3038;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--surface-dark);
    color: var(--text-primary);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 64px;
  }
  .wordmark {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .wordmark span.r { color: var(--accent-cyan); }
  nav ul { display: flex; gap: 32px; list-style: none; }
  nav a {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 500;
    transition: color 150ms ease-out;
  }
  nav a:hover { color: var(--accent-cyan); }
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 64px;
    max-width: 1280px;
    margin: 0 auto;
    width: 100%;
  }
  h1 {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 700;
    font-size: 88px;
    line-height: 1.04;
    letter-spacing: -0.04em;
    margin-bottom: 32px;
    max-width: 1100px;
  }
  .sub {
    font-size: 21px;
    color: var(--text-secondary);
    margin-bottom: 48px;
    max-width: 640px;
    line-height: 1.5;
  }
  .cta {
    display: inline-block;
    background: var(--primary-azure);
    color: white;
    padding: 16px 36px;
    border-radius: 4px;
    font-weight: 500;
    font-size: 16px;
    text-decoration: none;
    transition: background 150ms ease-out;
    align-self: flex-start;
    margin-bottom: 96px;
  }
  .cta:hover { background: var(--primary-azure-deep); }
  .services-line {
    display: flex;
    align-items: flex-start;
    gap: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--border-subtle);
    max-width: 800px;
    position: relative;
  }
  .services-line::before {
    content: '';
    position: absolute;
    top: 32px;
    left: 0;
    width: 40px;
    height: 1px;
    background: var(--accent-cyan);
    transform: translateY(-1px);
  }
  .service-item {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-top: 16px;
  }
  .service-icon {
    width: 24px;
    height: 24px;
  }
  .service-icon svg { stroke: var(--accent-cyan); fill: none; stroke-width: 1.5; width: 100%; height: 100%; }
  .service-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .service-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }
  .concept-tag {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface-elevated);
    border: 1px solid var(--border-subtle);
    padding: 8px 14px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .concept-tag b { color: var(--accent-cyan); }
</style>
</head>
<body>
  <nav>
    <div class="wordmark"><span class="r">R</span>ightek</div>
    <ul>
      <li><a href="#">Services</a></li>
      <li><a href="#">Cases</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
  <section class="hero">
    <h1>半導體 / 製造業的<br>Azure AI 整合夥伴</h1>
    <p class="sub">從資料整合、Azure ML 到 Power BI 智慧儀表板，端到端落地</p>
    <a href="#" class="cta">聯絡我們</a>
    <div class="services-line">
      <div class="service-item">
        <div class="service-icon"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.66 3.58 3 8 3s8-1.34 8-3V6"/><path d="M4 12v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/></svg></div>
        <div class="service-label">Data</div>
        <div class="service-desc">Integration<br>Synapse · DF</div>
      </div>
      <div class="service-item">
        <div class="service-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></div>
        <div class="service-label">ML</div>
        <div class="service-desc">Azure ML Studio<br>Custom Models</div>
      </div>
      <div class="service-item">
        <div class="service-icon"><svg viewBox="0 0 24 24"><path d="M3 18l6-6 4 4 8-8"/><path d="M21 6h-4M21 6v4M3 21h18"/></svg></div>
        <div class="service-label">BI</div>
        <div class="service-desc">Power BI<br>Premium</div>
      </div>
      <div class="service-item">
        <div class="service-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7l-10-5z"/><path d="M2 7l10 5 10-5M12 12v10"/></svg></div>
        <div class="service-label">AI</div>
        <div class="service-desc">Azure OpenAI<br>Service</div>
      </div>
    </div>
  </section>
  <div class="concept-tag"><b>Variant C</b> · 冷靜 builder</div>
</body>
</html>
